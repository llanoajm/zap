# Two-year stochastic capacity planning run
# Networks from gradient_ra_dataprep (WY 2010, 2011)
# python experiments/multi_year/runner.py experiments/multi_year/config_experiment.yaml 
#  srun --partition=serc --nodes=1 --ntasks=1 --cpus-per-task=32 --mem=64G --time=06:00:00 --pty bash
#  export WANDB_API_KEY="your-40-char-api-key-here"     

name: multi_year_experiment

network_files:
  - 2011_raw_network.nc
  - 2012_raw_network.nc

# Emissions penalty ($/ton CO2). Set to 0 to disable.
emissions_weight: 10.0

# Adaptive emissions targeting (dual ascent). Overrides emissions_weight when enabled.
# emissions_target:
#   enabled: true
#   target: 50000.0
#   initial_weight: 0.0
#   dual_step_size: 1.0
#   max_weight: 1000.0
#   num_outer_iterations: 10
#   tolerance: 0.05


# Block sampling: weekly blocks, use all of them
# sampling_strategy here defines which of the entire dataset to use, so in most cases we will keep this to all for my experiements.
block_size: 168
sampling_strategy: all
seed: 42

pypsa_args:
  power_unit: 1000.0
  cost_unit: 1.0


# Solvers
num_workers: 8                 # match --cpus-per-task in sbatch
dispatch_solver: GUROBI
# solver_kwargs:
#   verbose: true
#   accept_unknown: true
#   mosek_params:
#     MSK_IPAR_NUM_THREADS: 1

dispatch_solver_kwargs:
  verbose: false
  Method: -1                     # barrier/IPM — fastest for large LPs
  Crossover: 0                  # skip crossover (don't need vertex solution)
  BarConvTol: 1.0e-2
  OptimalityTol: 1.e-2
  FeasibilityTol: 1.e-2
  Threads: 1                    # parallelism lives at the num_workers level
  OutputFlag: 0


optimizer:
  batch_size: 8                # match num_workers so no threads sit idle
  num_iterations: 1000
  step_size: 0.001
  clip: 5000
  batch_strategy: random   # sequential, fixed, random
  peak_net_load_k: 1
  peak_net_load_rerank_every: 20
  track_full_loss_every: 100000
  init_full_loss: false    # skip upfront full-batch evaluation (730 solves)
  initial_state: initial_state     # start from LP relaxation solution

# Evaluate full loss (all subproblems) after optimization finishes.
# Requires enough memory to dispatch all subproblems at once.
eval_final_full_loss: false


# Weights & Biases logging
wandb:
  enabled: true
  project: zap-multiyear        # wandb project name
  run_name: null                # auto-generated from experiment name if null
  tags: [multi_year, 2yr]
  log_every: 1                  # log every N iterations

# Export the solved network so gradient_ra can pick it up
export:
  should_export: true


# Warm-start from the convex LP relaxation (recommended for this size)
relaxation:
  should_solve: false
  price_bound: 100.0
  num_subproblems: 3          # subsample relaxation blocks (null = use all)
  solver: MOSEK
  solver_kwargs:
    verbose: false
    Method: -1
    Crossover: 0
    BarConvTol: 1.0e-4
    Threads: 16
